<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tic Tac Toe</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #1a1a2e;
      font-family: 'Segoe UI', sans-serif;
      color: #eee;
    }

    h1 {
      font-size: 2.5rem;
      letter-spacing: 4px;
      margin-bottom: 24px;
      color: #e94560;
    }

    #status {
      font-size: 1.2rem;
      margin-bottom: 20px;
      height: 1.6em;
      color: #a8dadc;
      transition: color 0.3s;
    }

    #status.winner { color: #e94560; font-weight: bold; }

    #board {
      display: grid;
      grid-template-columns: repeat(3, 110px);
      grid-template-rows: repeat(3, 110px);
      gap: 8px;
    }

    .cell {
      background: #16213e;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
      font-weight: 900;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      user-select: none;
    }

    .cell:hover:not(.taken) { background: #0f3460; transform: scale(1.04); }
    .cell.taken { cursor: default; }
    .cell.x { color: #e94560; }
    .cell.o { color: #a8dadc; }
    .cell.win { background: #0f3460; box-shadow: 0 0 18px 4px rgba(233,69,96,0.4); }

    #reset {
      margin-top: 28px;
      padding: 12px 36px;
      font-size: 1rem;
      font-weight: 600;
      letter-spacing: 1px;
      background: #e94560;
      color: #fff;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
    }

    #reset:hover { background: #c73652; transform: scale(1.04); }

    #scores {
      display: flex;
      gap: 32px;
      margin-bottom: 24px;
      font-size: 1rem;
    }

    .score-box {
      text-align: center;
      background: #16213e;
      border-radius: 10px;
      padding: 10px 24px;
    }

    .score-box .label { color: #888; font-size: 0.8rem; letter-spacing: 1px; }
    .score-box .val { font-size: 1.8rem; font-weight: 700; margin-top: 2px; }
    .score-box.x .val { color: #e94560; }
    .score-box.o .val { color: #a8dadc; }
    .score-box.draw .val { color: #aaa; }
  </style>
</head>
<body>
  <h1>TIC TAC TOE</h1>

  <div id="scores">
    <div class="score-box x"><div class="label">X WINS</div><div class="val" id="sx">0</div></div>
    <div class="score-box draw"><div class="label">DRAWS</div><div class="val" id="sd">0</div></div>
    <div class="score-box o"><div class="label">O WINS</div><div class="val" id="so">0</div></div>
  </div>

  <div id="status">X's turn</div>

  <div id="board">
    <div class="cell" data-i="0"></div>
    <div class="cell" data-i="1"></div>
    <div class="cell" data-i="2"></div>
    <div class="cell" data-i="3"></div>
    <div class="cell" data-i="4"></div>
    <div class="cell" data-i="5"></div>
    <div class="cell" data-i="6"></div>
    <div class="cell" data-i="7"></div>
    <div class="cell" data-i="8"></div>
  </div>

  <button id="reset">New Game</button>

  <script>
    const WINS = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];

    let board, current, over;
    let scores = { X: 0, O: 0, D: 0 };

    const cells = document.querySelectorAll('.cell');
    const status = document.getElementById('status');

    function init() {
      board = Array(9).fill('');
      current = 'X';
      over = false;
      cells.forEach(c => { c.textContent = ''; c.className = 'cell'; });
      status.className = '';
      status.textContent = "X's turn";
    }

    function checkWin(b, p) {
      return WINS.find(line => line.every(i => b[i] === p)) || null;
    }

    function handleClick(e) {
      const idx = +e.currentTarget.dataset.i;
      if (over || board[idx]) return;

      board[idx] = current;
      const cell = cells[idx];
      cell.textContent = current;
      cell.classList.add('taken', current.toLowerCase());

      const line = checkWin(board, current);
      if (line) {
        line.forEach(i => cells[i].classList.add('win'));
        status.textContent = `${current} wins!`;
        status.className = 'winner';
        scores[current]++;
        updateScores();
        over = true;
      } else if (board.every(v => v)) {
        status.textContent = "Draw!";
        scores.D++;
        updateScores();
        over = true;
      } else {
        current = current === 'X' ? 'O' : 'X';
        status.textContent = `${current}'s turn`;
      }
    }

    function updateScores() {
      document.getElementById('sx').textContent = scores.X;
      document.getElementById('so').textContent = scores.O;
      document.getElementById('sd').textContent = scores.D;
    }

    cells.forEach(c => c.addEventListener('click', handleClick));
    document.getElementById('reset').addEventListener('click', init);

    init();
  </script>
</body>
</html>
